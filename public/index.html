<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MwoLab</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div id="app">
      <div class="topbar-state" hidden>
        <p id="data-status" data-i18n="status.loadingData">로컬 데이터 로딩 중...</p>
        <div class="summary-strip" id="summary-strip"></div>
      </div>

      <nav class="main-tabs" aria-label="Main tabs">
        <button class="tab-button" type="button" data-main-tab="mechlab" aria-controls="tab-mechlab" disabled aria-disabled="true" data-i18n="tabs.mechlab">현재 멕랩</button>
        <button class="tab-button active" type="button" data-main-tab="info" aria-controls="tab-info" data-i18n="tabs.info">정보</button>
        <button class="tab-button" type="button" data-main-tab="compare" aria-controls="tab-compare" data-i18n="tabs.compare">비교하기</button>
        <button class="tab-button" type="button" data-main-tab="stats" aria-controls="tab-stats" data-i18n="tabs.stats">통계</button>
        <a class="donate-link" href="https://ko-fi.com/killkimno" target="_blank" rel="noopener noreferrer" aria-label="Ko-fi 후원 페이지 열기" data-i18n="donate.label" data-i18n-aria-label="donate.aria">후원하기</a>
        <div class="language-switch" aria-label="언어 선택" data-i18n-aria-label="language.switcher">
          <a href="?lang=kr" data-lang-link="kr" data-i18n="language.kr">한국어</a>
          <a href="?lang=en" data-lang-link="en" data-i18n="language.en">English</a>
        </div>
      </nav>

      <main class="app-main">
        <div id="mech-browser-layout" class="mech-browser-layout">
          <aside class="sidebar">
            <div class="toolbar">
              <div class="mech-toolbar-row">
                <input id="mech-search" type="search" placeholder="기종 또는 변형 검색" data-i18n-placeholder="search.mechPlaceholder">
                <button id="mech-list-view-toggle" class="mech-list-view-toggle" type="button" aria-pressed="true" title="작은 리스트 보기" data-i18n-title="list.smallView">&lt;&lt;</button>
              </div>
              <select id="faction-filter">
                <option value="" data-i18n="filters.allFactions">모든 진영</option>
                <option value="InnerSphere">Inner Sphere</option>
                <option value="Clan">Clan</option>
              </select>
              <select id="weight-filter">
                <option value="" data-i18n="filters.allWeightClasses">모든 체급</option>
                <option value="light" data-i18n="weight.light">라이트</option>
                <option value="medium" data-i18n="weight.medium">미디엄</option>
                <option value="heavy" data-i18n="weight.heavy">헤비</option>
                <option value="assault" data-i18n="weight.assault">어썰트</option>
              </select>
              <select id="mech-sort">
                <option value="default" data-i18n="sort.default">기본 정렬</option>
                <option value="tons" data-i18n="sort.tons">톤수 정렬</option>
              </select>
            </div>
            <div id="mech-list" class="mech-list"></div>
          </aside>

          <div class="tab-content">
            <section id="tab-mechlab" class="tab-panel" hidden>
              <div class="workspace">
                <section class="variant-panel">
                  <div>
                    <h2 id="variant-name" data-i18n="info.selectMech">멕을 선택하세요</h2>
                    <div id="variant-meta" class="muted"></div>
                  </div>
                  <div class="actions">
                    <button id="reset-stock" type="button">Stock</button>
                    <button id="save-build" type="button">Save</button>
                    <button id="clear-build" type="button">Clear</button>
                  </div>
                </section>

                <section class="quirks-panel">
                  <div class="section-title-row">
                    <h3>QUIRKS</h3>
                    <span id="quirk-count" class="muted"></span>
                  </div>
                  <div id="quirks" class="quirks"></div>
                </section>

                <section class="mechlab-grid">
                  <div class="components-panel">
                    <h3>Components</h3>
                    <div id="components" class="components"></div>
                  </div>

                  <div class="equipment-panel">
                    <h3>Equipment</h3>
                    <div class="toolbar equipment-toolbar">
                      <input id="item-search" type="search" placeholder="장비 검색" data-i18n-placeholder="search.itemPlaceholder">
                      <select id="item-family">
                        <option value="" data-i18n="filters.allEquipment">모든 장비</option>
                        <option value="weapons" data-i18n="filters.weapons">무기</option>
                        <option value="ammo" data-i18n="filters.ammo">탄약</option>
                        <option value="engines" data-i18n="filters.engines">엔진</option>
                        <option value="equipment" data-i18n="filters.equipment">장비</option>
                        <option value="jumpjets" data-i18n="filters.jumpjets">점프젯</option>
                        <option value="masc">MASC</option>
                        <option value="weapon_mods" data-i18n="filters.weaponMods">무기 모드</option>
                      </select>
                    </div>
                    <div id="selected-item" class="selected-item muted" data-i18n="equipment.noItem">장비가 선택되지 않았습니다</div>
                    <div id="item-list" class="item-list"></div>
                  </div>
                </section>
              </div>
            </section>

            <section id="tab-info" class="tab-panel info-workspace active">
              <section class="variant-panel">
                <div>
                  <h2 id="info-variant-name" data-i18n="info.selectMech">멕을 선택하세요</h2>
                  <div id="info-variant-meta" class="muted"></div>
                </div>
                <div class="info-actions">
                  <label class="toggle-row">
                    <input id="info-apply-quirks" type="checkbox" checked>
                    <span data-i18n="info.applyQuirks">쿼크 적용</span>
                  </label>
                </div>
              </section>
              <div id="mech-info" class="info-grid"></div>
            </section>

            <section id="tab-compare" class="tab-panel info-workspace" hidden>
              <section class="variant-panel">
                <div>
                  <h2 id="compare-variant-name" data-i18n="compare.title">멕 비교</h2>
                  <div id="compare-variant-meta" class="muted"></div>
                </div>
                <div class="info-actions">
                  <button id="compare-clear-compare" class="info-clear-compare" type="button" data-i18n="compare.clear">비교 리스트 모두 지우기</button>
                  <label class="toggle-row">
                    <input id="compare-deltas" type="checkbox" checked>
                    <span data-i18n="compare.showDeltas">차이 표시</span>
                  </label>
                  <label class="toggle-row">
                    <input id="compare-apply-quirks" type="checkbox" checked>
                    <span data-i18n="info.applyQuirks">쿼크 적용</span>
                  </label>
                </div>
              </section>
              <div id="compare-info" class="compare-grid"></div>
            </section>
          </div>
        </div>

        <section id="tab-stats" class="tab-panel stats-panel" hidden>
          <div class="stats-toolbar" aria-label="통계 종류" data-i18n-aria-label="stats.kind">
            <div class="stats-toolbar-group">
              <button id="stats-detail-toggle" class="stats-expand-button" type="button" aria-label="통계 하위 메뉴 접기" data-i18n-aria-label="stats.collapse" aria-expanded="true" aria-controls="stats-category-menu stats-scope-menu stats-mode-menu stats-condition-controls">▼</button>
              <div class="stats-rank-toggle" role="group" aria-label="순위 표시 방식" data-i18n-aria-label="stats.rankMode">
                <button class="stats-rank-button active" type="button" data-stats-rank-mode="individual" data-i18n="stats.individual">개별</button>
                <button class="stats-rank-button" type="button" data-stats-rank-mode="chassis" data-i18n="stats.chassis">기종별</button>
              </div>
              <div id="stats-chassis-aggregate-toggle" class="stats-rank-toggle stats-aggregate-toggle" role="group" aria-label="기종별 집계 방식" data-i18n-aria-label="stats.aggregateMode" hidden>
                <button class="stats-rank-button active" type="button" data-stats-chassis-aggregate="average" data-i18n="common.average">평균</button>
                <button class="stats-rank-button" type="button" data-stats-chassis-aggregate="max" data-i18n="common.max">최대치</button>
                <button class="stats-rank-button" type="button" data-stats-chassis-aggregate="min" data-i18n="common.min">최소치</button>
              </div>
              <span class="stats-toolbar-divider" aria-hidden="true"></span>
              <button class="stats-button active" type="button" data-stats-view="durability" data-i18n="info.durability">내구도</button>
              <button class="stats-button" type="button" data-stats-view="mobility" data-i18n="info.mobility">기동성</button>
              <button class="stats-button" type="button" data-stats-view="quirks">QUIRKS</button>
            </div>
          </div>
          <div id="stats-category-menu" class="stats-subnav stats-category-nav" data-stats-detail-menu aria-label="통계 카테고리" data-i18n-aria-label="stats.category">
            <button class="stats-subbutton active" type="button" data-stats-category-view="durability" data-stats-durability-category="total" data-i18n="stats.total">총합</button>
            <button class="stats-subbutton" type="button" data-stats-category-view="durability" data-stats-durability-category="armor" data-i18n="common.armor">아머</button>
            <button class="stats-subbutton" type="button" data-stats-category-view="durability" data-stats-durability-category="structure" data-i18n="stats.structure">스트럭쳐</button>
            <button class="stats-subbutton" type="button" data-stats-category-view="mobility" data-stats-mobility-category="acceleration" hidden data-i18n="info.acceleration">가속</button>
            <button class="stats-subbutton" type="button" data-stats-category-view="mobility" data-stats-mobility-category="deceleration" hidden data-i18n="info.deceleration">감속</button>
            <button class="stats-subbutton" type="button" data-stats-category-view="mobility" data-stats-mobility-category="turnSpeed" hidden data-i18n="info.turnSpeed">선회 속도</button>
            <button class="stats-subbutton" type="button" data-stats-category-view="mobility" data-stats-mobility-category="torsoSpeedX" hidden data-i18n="info.torsoSpeed">몸통 회전속도</button>
            <button class="stats-subbutton" type="button" data-stats-category-view="quirks" data-stats-quirk-category="cooldown" hidden data-i18n="info.cooldown">쿨 다운</button>
            <button class="stats-subbutton" type="button" data-stats-category-view="quirks" data-stats-quirk-category="heat" hidden data-i18n="common.heat">발열</button>
            <button class="stats-subbutton" type="button" data-stats-category-view="quirks" data-stats-quirk-category="durability" hidden data-i18n="info.durability">내구도</button>
            <button class="stats-subbutton" type="button" data-stats-category-view="quirks" data-stats-quirk-category="range" hidden data-i18n="info.range">사거리</button>
            <button class="stats-subbutton" type="button" data-stats-category-view="quirks" data-stats-quirk-category="velocity" hidden data-i18n="info.velocity">탄속</button>
            <button class="stats-subbutton" type="button" data-stats-category-view="quirks" data-stats-quirk-category="select" hidden disabled data-i18n="stats.quirkSelect">쿼크 선택</button>
          </div>
          <div id="stats-scope-menu" class="stats-subnav stats-scope-nav" data-stats-detail-menu data-stats-view-section="durability" aria-label="내구도 범위" data-i18n-aria-label="stats.scope">
            <button class="stats-subbutton active" type="button" data-stats-durability-scope="all" data-i18n="stats.all">전체</button>
            <button class="stats-subbutton" type="button" data-stats-durability-scope="torsoShoulders" data-i18n="stats.torsoShoulders">어깨+몸통</button>
            <button class="stats-subbutton" type="button" data-stats-durability-scope="torso" data-i18n="stats.torso">몸통</button>
            <button class="stats-subbutton" type="button" data-stats-durability-scope="shoulders" data-i18n="stats.shoulders">어깨</button>
          </div>
          <div id="stats-mode-menu" class="stats-subnav" data-stats-detail-menu aria-label="순위 비교 방식" data-i18n-aria-label="stats.mode">
            <button class="stats-subbutton active" type="button" data-stats-durability-mode="all" data-i18n="stats.allList">전체 목록</button>
            <button class="stats-subbutton" type="button" data-stats-durability-mode="condition" data-i18n="stats.filter">필터</button>
          </div>
          <section class="stats-workspace" aria-label="통계" data-i18n-aria-label="stats.workspace">
            <div id="stats-condition-controls" class="stats-condition-controls" hidden>
              <label class="stats-filter-field">
                <span data-i18n="stats.faction">진영</span>
                <select id="stats-faction-filter"></select>
              </label>
              <div class="stats-filter-field">
                <span data-i18n="stats.compareBy">비교 기준</span>
                <div class="stats-filter-toggle" role="group" aria-label="필터 기준" data-i18n-aria-label="stats.filterAxis">
                  <button type="button" data-stats-condition-axis="weight" data-i18n="stats.weight">체급</button>
                  <button type="button" data-stats-condition-axis="tons" data-i18n="stats.tons">톤수</button>
                </div>
              </div>
              <div id="stats-weight-options" class="stats-option-group" aria-label="체급 선택" data-i18n-aria-label="stats.weightSelect"></div>
              <div id="stats-ton-options" class="stats-option-group" aria-label="톤수 선택" data-i18n-aria-label="stats.tonsSelect"></div>
            </div>
            <div class="stats-content">
              <div id="stats-list" class="stats-list"></div>
              <aside id="stats-detail" class="stats-detail" aria-label="통계 상세" data-i18n-aria-label="stats.detail"></aside>
            </div>
          </section>
        </section>
      </main>
    </div>

    <div id="compare-overlay" class="compare-header-overlay" hidden>
      <div id="compare-overlay-cells" class="compare-header-overlay-cells"></div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
